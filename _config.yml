# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Z4kr Security
subtitle: Testing subtitle :) 
email:
description: >- # this means to ignore newlines until "baseurl:"
  MEJORAR ESTA MIERDA XD
#twitter_username: username
github_username: Z4kr-Sec
minimal_mistakes_skin: "air"
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
#theme: minimal-mistakes-jekyll
locale: "en-US"
repository: "Z4kr-Sec/Z4kr-Sec.github.io"
##enable copy button 
enable_copy_code_button: true


# Outputting

## Set base URL
#url: "https://z4kr-sec.github.io/"
#baseurl: "Z4kr-Sec.github.io"
permalink: /:categories/:title/
paginate: 3 # amount of posts to show -- el total de paginas que tienes en la barra de abajo 
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Ricardo Morales S."
  avatar : "/assets/images/cyber dead.jpg"
  bio    : "INSERT AND INTERESTING DESCRIPTION XD"
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://x.com/RicardoM1124"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Z4kr-Sec/initHACK"
    - label: "Linkedin"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/ricardo-andres-morales-solorzano-491b26191/"

footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://x.com/RicardoM1124"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Z4kr-Sec/initHACK"
    - label: "Linkedin"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/ricardo-andres-morales-solorzano-491b26191/"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      show_date: true
      read_time: false
      comments: false
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: splash 
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/


# Site Scripts
head_scripts:
  - https://code.jquery.com/jquery-3.2.1.min.js
  - /assets/js/your-custom-head-script.js

---
layout: archive
---
{{ content }}

<div class="entries-list">
    {% assign writeups = site.posts | where: "categories", "write-up" %}

    {% for writeup in writeups %}
        <div class="writeup-item">
            <h2><a hef="{{ writeup.url }}">{{ writeup.title }}</a></h2>
            <p>{{ writeup.excerpt | truncate: 200 }}</p>
        </div>
    {% endfor %}
</div>

---

<!--this will contain the write up page, the categories will be: OS (Windoes, Linux, etc),
dificulty(Easy, medium,hard and insane )-->
layout: archive
---
{{ content }}


<div class="entries-list">
  {% assign projects = site.posts | where: "categories", "write-up" %}
  
  {% for project in projects %}
    <div class="project-item">
      <h2><a href="{{ project.url }}">{{ project.title }}</a></h2>
      <p>{{ project.excerpt | truncate: 200 }}</p>
    </div>
  {% endfor %}
</div>
